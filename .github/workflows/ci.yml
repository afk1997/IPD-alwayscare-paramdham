name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arham
          POSTGRES_PASSWORD: arham_dev
          POSTGRES_DB: arham_ipd
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U arham -d arham_ipd"
          --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DATABASE_URL: postgresql://arham:arham_dev@localhost:5432/arham_ipd?schema=public
      # Prisma's schema declares directUrl = env("DIRECT_URL"); for the
      # CI's local Postgres service the direct URL is the same as
      # DATABASE_URL (no pooler in front).
      DIRECT_URL: postgresql://arham:arham_dev@localhost:5432/arham_ipd?schema=public
      AUTH_SECRET: ci-secret-for-build-only-not-real
      AUTH_URL: http://localhost:3000
      STORAGE_DRIVER: local
      LOCAL_UPLOAD_DIR: ./uploads
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # Generate the Prisma client BEFORE typecheck so @prisma/client exports
      # (PrismaClient, ActivityType, Role, etc.) resolve.  postinstall in
      # package.json does this for fresh installs, but pnpm sometimes skips
      # lifecycle scripts when --frozen-lockfile + cache hit — keep an
      # explicit step here as a guarantee.
      - run: pnpm exec prisma generate
      - run: pnpm exec prisma migrate deploy
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm exec playwright install --with-deps chromium
      - run: |
          echo "DATABASE_URL=$DATABASE_URL" > .env.local
          echo "DIRECT_URL=$DIRECT_URL" >> .env.local
          echo "AUTH_SECRET=$AUTH_SECRET" >> .env.local
          echo "AUTH_URL=$AUTH_URL" >> .env.local
          echo "STORAGE_DRIVER=$STORAGE_DRIVER" >> .env.local
          echo "LOCAL_UPLOAD_DIR=$LOCAL_UPLOAD_DIR" >> .env.local
          echo "NODE_ENV=development" >> .env.local
      - run: pnpm run db:seed
      - run: pnpm exec playwright test
      # Playwright tears down its webServer when tests finish, but the
      # standalone qa-* probes still need a running app. Boot `next
      # start` (production build is already on disk from `pnpm run
      # build` above) in the background and wait for /login to answer.
      - name: Start app server for qa probes
        run: |
          pnpm exec dotenv -e .env.local -- pnpm exec next start --port 3000 &
          echo $! > /tmp/next.pid
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/login > /dev/null; then
              echo "server up"
              exit 0
            fi
            sleep 1
          done
          echo "server did not come up in 60s"
          exit 1
      - run: pnpm exec dotenv -e .env.local -- tsx scripts/qa-trash-page.ts
      - run: pnpm exec dotenv -e .env.local -- tsx scripts/qa-trash-rbac.ts
      - run: pnpm exec dotenv -e .env.local -- tsx scripts/qa-activity-share.ts
      - run: pnpm exec dotenv -e .env.local -- tsx scripts/qa-by-animal-list.ts
      - run: pnpm exec dotenv -e .env.local -- tsx scripts/qa-daily-report-share.ts
      - run: pnpm exec dotenv -e .env.local -- tsx scripts/qa-logged-by-dropdown.ts
      - run: pnpm exec dotenv -e .env.local -- tsx scripts/qa-patient-share.ts
      - name: Stop app server
        if: always()
        run: |
          if [ -f /tmp/next.pid ]; then
            kill "$(cat /tmp/next.pid)" 2>/dev/null || true
          fi
