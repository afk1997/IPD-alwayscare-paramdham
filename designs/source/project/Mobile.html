<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Arham Always Care — IPD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body, #root { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    color: #0F1B26;
    background: #F5F8FA;
    -webkit-font-smoothing: antialiased;
  }
  button, input, select, textarea { font-family: inherit; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes slideRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
  @keyframes modalIn { from { opacity:0; transform: translateY(8px) scale(.98); } to { opacity:1; transform: translateY(0) scale(1); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  div::-webkit-scrollbar { display: none; }
  div { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script>window.UI_MODE = 'mobile';</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data layer -->
<script src="data.js"></script>

<!-- Tweaks panel -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Icons + shell primitives (Header, BottomNav, sheets — all UI-mode-aware) -->
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>

<!-- Media primitives -->
<script type="text/babel" src="media.jsx"></script>

<!-- Screens -->
<script type="text/babel" src="screens-main.jsx"></script>
<script type="text/babel" src="screens-forms.jsx"></script>
<script type="text/babel" src="activity-detail.jsx"></script>

<!-- Mobile entry -->
<script type="text/babel" src="app-mobile.jsx"></script>
</body>
</html>
